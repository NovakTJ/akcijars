<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prijava – AkcijaRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="logo.png" alt="AkcijaRS" style="height:44px;width:auto;object-fit:contain;">
      </div>

      <h1 class="auth-title">Dobrodošli nazad</h1>
      <p class="auth-subtitle">Prijavite se na vaš nalog</p>

      <div id="global-error"   class="alert alert-error"   style="display:none;"></div>
      <div id="global-warning" class="alert alert-warning" style="display:none;"></div>
      <div id="global-success" class="alert alert-success" style="display:none;"></div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>

        <div class="form-group">
          <label class="form-label">Email adresa <span class="req">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="vase@email.com" autocomplete="email">
          <div class="form-error" id="err-email" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Lozinka <span class="req">*</span></label>
          <div class="password-toggle">
            <input type="password" id="lozinka" class="form-control" placeholder="Vaša lozinka" autocomplete="current-password">
            <button type="button" class="toggle-btn" onclick="togglePwd()"><i class="bi bi-eye"></i></button>
          </div>
          <div class="form-error" id="err-lozinka" style="display:none;"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px;" id="submit-btn">
          <i class="bi bi-box-arrow-in-right"></i> Prijavi se
        </button>
      </form>

      <div class="auth-footer">
        Nemate nalog? <a href="registracija.html">Registrujte se</a>
      </div>

    </div>
  </div>

  <script src="data.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');

    // ── Demo nalozi (samo za prototip, ne prikazuju se korisniku) ──
    const DEMO_USERS = [
      { email:'volonter@test.rs',    lozinka:'lozinka123!', ime:'Marko',  prezime:'Marković', uloga:'volonter',    odobren:true  },
      { email:'organizator@test.rs', lozinka:'lozinka123!', ime:'Ana',    prezime:'Anić',     uloga:'organizator', odobren:true,  organizacija:'Zeleni Beograd'       },
      { email:'sponzor@test.rs',     lozinka:'lozinka123!', ime:'Stefan', prezime:'Stefić',   uloga:'sponzor',     odobren:true,  organizacija:'Stefan Sponzor d.o.o.' },
      { email:'admin@test.rs',       lozinka:'lozinka123!', ime:'Admin',  prezime:'',         uloga:'admin',       odobren:true  },
      { email:'pending@test.rs',     lozinka:'lozinka123!', ime:'Neodo',  prezime:'Breni',    uloga:'organizator', odobren:false },
    ];

    function togglePwd() {
      const f = document.getElementById('lozinka');
      const btn = document.querySelector('.toggle-btn');
      if (f.type === 'password') { f.type = 'text';     btn.innerHTML = '<i class="bi bi-eye-slash"></i>'; }
      else                       { f.type = 'password'; btn.innerHTML = '<i class="bi bi-eye"></i>'; }
    }

    function clearErrors() {
      document.getElementById('err-email').style.display   = 'none';
      document.getElementById('err-lozinka').style.display = 'none';
      document.getElementById('email').classList.remove('is-error');
      document.getElementById('lozinka').classList.remove('is-error');
      document.getElementById('global-error').style.display   = 'none';
      document.getElementById('global-warning').style.display = 'none';
      document.getElementById('global-success').style.display = 'none';
    }

    function showFieldErr(fieldId, msg) {
      const el = document.getElementById('err-' + fieldId);
      el.innerHTML = '<i class="bi bi-exclamation-circle"></i> ' + msg;
      el.style.display = 'flex';
      document.getElementById(fieldId).classList.add('is-error');
    }

    function handleLogin(e) {
      e.preventDefault();
      clearErrors();

      const email   = document.getElementById('email').value.trim();
      const lozinka = document.getElementById('lozinka').value;

      // Validacija – prazna polja
      if (!email)   { showFieldErr('email',   'Email adresa je obavezna.'); return; }
      if (!lozinka) { showFieldErr('lozinka', 'Lozinka je obavezna.');      return; }

      // Validacija – format emaila
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldErr('email', 'Email adresa nije ispravnog formata.');
        return;
      }

      // Loading stanje
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;"></span> Prijava...';

      setTimeout(() => {
        const user = DEMO_USERS.find(u => u.email === email.toLowerCase());

        // Korisnik ne postoji
        if (!user) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Prijavi se';
          const ge = document.getElementById('global-error');
          ge.innerHTML = '<i class="bi bi-x-circle-fill"></i> Ne postoji nalog sa tom email adresom.';
          ge.style.display = 'flex';
          return;
        }

        // Pogrešna lozinka
        if (user.lozinka !== lozinka) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Prijavi se';
          const ge = document.getElementById('global-error');
          ge.innerHTML = '<i class="bi bi-x-circle-fill"></i> Pogrešna lozinka.';
          ge.style.display = 'flex';
          return;
        }

        // Nalog na čekanju (neodobren)
        if (!user.odobren) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Prijavi se';
          const gw = document.getElementById('global-warning');
          gw.innerHTML = '<i class="bi bi-clock-history"></i> Vaš nalog čeka odobrenje administratora. Pokušajte kasnije.';
          gw.style.display = 'flex';
          return;
        }

        // ── USPEH: sačuvaj korisnika i preusmeri ──
        AUTH.login(user);
        const gs = document.getElementById('global-success');
        gs.innerHTML = '<i class="bi bi-check-circle-fill"></i> Prijava uspešna! Preusmeravanje...';
        gs.style.display = 'flex';

        setTimeout(() => {
          location.href = getDashboardLink(user.uloga);
        }, 1000);

      }, 700);
    }
  </script>
</body>
</html>
