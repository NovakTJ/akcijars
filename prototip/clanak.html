<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Članak – AkcijaRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="page-content">
    <div class="container" style="max-width:820px;" id="page-body">
      <div class="empty-state"><div class="es-icon">⏳</div><p>Učitavanje...</p></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="data.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('clanci');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'));
    const clanak = CLANCI.find(c => c.id===id);
    const storageKey = 'comments_' + id;

    if (!clanak) {
      document.getElementById('page-body').innerHTML = `
        <div class="empty-state">
          <div class="es-icon">😕</div><h3>Članak nije pronađen</h3>
          <p>Ovaj članak ne postoji ili je uklonjen.</p>
          <a href="clanci.html" class="btn btn-primary">← Nazad na članke</a>
        </div>`;
    } else {
      renderPage();
    }

    function getComments() {
      const stored = localStorage.getItem(storageKey);
      if (stored) return JSON.parse(stored);
      return clanak.komentari || [];
    }

    function saveComments(arr) {
      localStorage.setItem(storageKey, JSON.stringify(arr));
    }

    function renderPage() {
      const user = AUTH.getUser();
      const comments = getComments();

      const commentsHtml = comments.length > 0
        ? comments.map(c => `
          <div class="comment-item">
            <div class="comment-avatar">${c.autor.charAt(0)}</div>
            <div class="comment-content">
              <div class="comment-meta"><strong>${c.autor}</strong> · ${formatDate(c.datum)}</div>
              <div class="comment-text">${c.tekst}</div>
            </div>
          </div>`).join('')
        : `<p style="color:var(--text-muted);font-size:.9rem;padding:20px 0;">Još nema komentara. Budite prvi!</p>`;

      const commentFormHtml = user
        ? `<div class="comment-form">
            <div id="comment-error" class="alert alert-error" style="display:none;"></div>
            <div id="comment-success" class="alert alert-success" style="display:none;"></div>
            <div class="form-group">
              <label class="form-label">Vaš komentar</label>
              <textarea id="comment-input" class="form-control" placeholder="Napišite komentar..." rows="4"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitComment()">
              <i class="bi bi-send"></i> Objavi komentar
            </button>
          </div>`
        : `<div class="alert alert-info" style="margin-top:20px;">
            <i class="bi bi-person-circle"></i>
            <span><a href="prijava.html" style="font-weight:700;color:var(--teal-hover);">Prijavite se</a> da biste ostavili komentar.</span>
          </div>`;

      document.getElementById('page-body').innerHTML = `
        <!-- Breadcrumb -->
        <div class="breadcrumb">
          <a href="index.html">Početna</a>
          <i class="bi bi-chevron-right" style="font-size:.75rem;"></i>
          <a href="clanci.html">Članci</a>
          <i class="bi bi-chevron-right" style="font-size:.75rem;"></i>
          <span style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${clanak.naslov}</span>
        </div>

        <!-- Article hero (naslovna = slike[0]) -->
        ${clanak.slike && clanak.slike.length ? `
        <div class="article-hero" style="padding:0;overflow:hidden;">
          <img src="${clanak.slike[0]}" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>` : ''}

        <!-- Article header -->
        <div class="article-header">
          <div class="card-meta" style="margin-bottom:14px;">
            ${getKategorijaBadge(clanak.kategorija)}
          </div>
          <h1 style="font-size:1.875rem;font-weight:800;line-height:1.3;margin-bottom:16px;">${clanak.naslov}</h1>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--green-light));display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--teal-hover);">
                ${clanak.organizator.charAt(0)}
              </div>
              <div>
                <div style="font-size:.875rem;font-weight:700;color:var(--dark);">${clanak.organizator}</div>
                <div style="font-size:.75rem;color:var(--text-muted);">Organizator</div>
              </div>
            </div>
            <span class="card-meta-item"><i class="bi bi-calendar3"></i>${formatDate(clanak.datumObjave)}</span>
            ${clanak.lokacija?`<span class="card-meta-item"><i class="bi bi-geo-alt"></i>${clanak.lokacija}</span>`:''}
            <span class="card-meta-item"><i class="bi bi-chat-left-text"></i><span id="comment-count">${comments.length} komentara</span></span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Article body -->
        <div class="article-body">
          ${clanak.sadrzaj.split('\n\n').map(p=>`<p>${p}</p>`).join('')}
        </div>

        ${clanak.slike && clanak.slike.length > 1 ? `
        <div style="margin-top:32px;">
          <h3 style="font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;">
            <i class="bi bi-images" style="color:var(--teal);"></i> Fotografije
          </h3>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;">
            ${clanak.slike.slice(1).map(s => `
              <div style="border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;">
                <img src="${s}" style="width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;transition:transform .2s;"
                  onmouseover="this.style.transform='scale(1.03)'"
                  onmouseout="this.style.transform='scale(1)'">
              </div>`).join('')}
          </div>
        </div>` : ''}

        <div class="divider" style="margin-top:40px;"></div>

        <!-- Comments -->
        <div class="comments-section">
          <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:24px;">
            <i class="bi bi-chat-left-text" style="color:var(--teal);margin-right:8px;"></i>
            Komentari (<span id="comment-count-2">${comments.length}</span>)
          </h2>
          <div id="comments-list">${commentsHtml}</div>
          ${commentFormHtml}
        </div>

        <!-- Back link -->
        <div style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border-light);">
          <a href="clanci.html" class="btn btn-ghost">
            <i class="bi bi-arrow-left"></i> Nazad na sve članke
          </a>
        </div>`;
    }

    function submitComment() {
      const input = document.getElementById('comment-input');
      const errEl = document.getElementById('comment-error');
      const sucEl = document.getElementById('comment-success');
      const text = input.value.trim();

      errEl.style.display='none';
      sucEl.style.display='none';

      if (!text) {
        errEl.innerHTML='<i class="bi bi-exclamation-circle"></i> Komentar ne može biti prazan!';
        errEl.style.display='flex'; return;
      }

      const user = AUTH.getUser();
      const comments = getComments();
      const newComment = {
        autor: user.ime + ' ' + (user.prezime||''),
        tekst: text,
        datum: new Date().toISOString().split('T')[0]
      };
      comments.push(newComment);
      saveComments(comments);

      input.value='';
      sucEl.innerHTML='<i class="bi bi-check-circle-fill"></i> Komentar je uspešno objavljen.';
      sucEl.style.display='flex';

      // Re-render comments list
      const list = document.getElementById('comments-list');
      list.innerHTML = comments.map(c=>`
        <div class="comment-item">
          <div class="comment-avatar">${c.autor.charAt(0)}</div>
          <div class="comment-content">
            <div class="comment-meta"><strong>${c.autor}</strong> · ${formatDate(c.datum)}</div>
            <div class="comment-text">${c.tekst}</div>
          </div>
        </div>`).join('');

      document.querySelectorAll('#comment-count, #comment-count-2').forEach(el=>el.textContent=comments.length+' komentara');
      setTimeout(()=>sucEl.style.display='none',3000);
    }
  </script>
</body>
</html>
